name: omngai_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Networking ---
  dio: ^5.7.0

  # --- Local secure storage (token/userId) ---
  flutter_secure_storage: ^9.2.2

  # --- Env config (.env) ---
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # โหลดไฟล์ env (ต้องมีไฟล์ .env อยู่ที่ root โปรเจค)
  assets:
    - .env
    - assets/images/